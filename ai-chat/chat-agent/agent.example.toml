# ── Guardrails Proxy ──────────────────────────────
# Route all LLM API calls through a guardrails proxy.
[guardrails]
enabled = false
proxy_url = ""

# ── Webhook Notifications ─────────────────────────
# POST JSON to this URL on events.
[webhooks]
url = ""
on_error = true
on_limit_reached = true
on_session_end = true
