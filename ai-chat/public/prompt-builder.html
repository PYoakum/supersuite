<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>agent-chat // prompt builder</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0c0e12;
      --bg-surface: #12151b;
      --bg-hover: #1a1e27;
      --border: #1e2330;
      --text: #c5cdd9;
      --text-dim: #6b7a8d;
      --text-bright: #e4eaf1;
      --accent: #5de4c7;
      --accent-dim: #2a7a65;
      --agent: #d4a05a;
      --system: #8a7cbf;
      --human: #7eb8da;
      --error: #e05252;
      --font-mono: "JetBrains Mono", "Fira Code", "SF Mono", "Cascadia Code", "Consolas", monospace;
      --font-size: 13px;
      --line-height: 1.55;
      --radius: 3px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: var(--font-size);
      line-height: var(--line-height);
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 16px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      min-height: 40px;
    }

    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-right { display: flex; align-items: center; gap: 10px; }

    .logo {
      color: var(--accent);
      font-weight: 600;
      font-size: 14px;
      letter-spacing: -0.3px;
    }

    .subtitle {
      color: var(--text-dim);
      font-size: 12px;
    }

    .stat {
      color: var(--text-dim);
      font-size: 11px;
    }

    main {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    main::-webkit-scrollbar { width: 6px; }
    main::-webkit-scrollbar-track { background: transparent; }
    main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .builder-section {
      max-width: 720px;
      margin: 0 auto;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 12px;
    }

    label {
      color: var(--text-dim);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
    }

    textarea, input[type="text"] {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 12px;
      padding: 8px 10px;
      border-radius: var(--radius);
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }

    textarea {
      resize: vertical;
      min-height: 100px;
      line-height: 1.6;
    }

    textarea:focus, input[type="text"]:focus {
      border-color: var(--accent-dim);
    }

    input[type="text"]::placeholder, textarea::placeholder {
      color: var(--text-dim);
    }

    .var-fields {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: flex-end;
    }

    .var-fields .field-group {
      flex: 1 1 180px;
      margin-bottom: 0;
    }

    .action-btn {
      background: var(--accent-dim);
      color: var(--text-bright);
      border: none;
      font-family: var(--font-mono);
      font-size: 12px;
      padding: 8px 16px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.15s;
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .action-btn:hover { background: var(--accent); color: var(--bg); }

    .no-vars {
      color: var(--text-dim);
      font-size: 11px;
      padding: 6px 0;
    }

    .prompt-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 20px;
    }

    .prompt-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .prompt-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-hover);
    }

    .prompt-card-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--agent);
      display: flex;
      gap: 8px;
      align-items: center;
      min-width: 0;
      overflow: hidden;
    }

    .prompt-card-title .tag {
      font-size: 10px;
      color: var(--accent-dim);
      background: rgba(93, 228, 199, 0.08);
      padding: 1px 6px;
      border-radius: 2px;
      font-weight: 400;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
    }

    .prompt-card-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .icon-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-size: 14px;
      width: 28px;
      height: 28px;
      border-radius: var(--radius);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .icon-btn:hover {
      border-color: var(--accent-dim);
      color: var(--accent);
    }

    .icon-btn.copied {
      border-color: var(--accent);
      color: var(--accent);
    }

    .icon-btn.delete:hover {
      border-color: var(--error);
      color: var(--error);
    }

    .prompt-card-body {
      padding: 12px;
      font-size: 12px;
      color: var(--text-bright);
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .prompt-card-body .tpl-val {
      font-weight: 600;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-dim);
      font-size: 12px;
    }

    .empty-state .hint {
      margin-top: 8px;
      font-size: 11px;
      color: var(--border);
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 16px 0;
    }

    @media (max-width: 600px) {
      .var-fields { flex-direction: column; }
      .var-fields .field-group { flex-basis: auto; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <a href="/" style="text-decoration:none;"><span class="logo">&#9654; agent-chat</span></a>
      <span class="subtitle">prompt builder</span>
    </div>
    <div class="header-right">
      <span class="stat" id="prompt-count">0 prompts</span>
    </div>
  </header>

  <main>
    <div class="builder-section">

      <div class="field-group">
        <label for="template-input">template</label>
        <textarea id="template-input" placeholder="Write your prompt template using {{VARIABLE}} tokens..."></textarea>
      </div>

      <div id="var-fields" class="var-fields"></div>

      <div style="margin-top:12px;">
        <button class="action-btn" id="generate-btn">generate</button>
      </div>

      <hr class="divider">

      <div class="prompt-list" id="prompt-list">
        <div class="empty-state" id="empty-state">
          no prompts generated yet
          <div class="hint">define a template with {{VARIABLES}}, fill in values, and click generate</div>
        </div>
      </div>

    </div>
  </main>

  <script>
    const VAR_COLORS = ['#5de4c7', '#d4a05a', '#8a7cbf', '#7eb8da', '#e05252', '#a8cc8c', '#d4768c'];

    const DEFAULT_TEMPLATE = `You are a specialist, who specializes in {{SPECIALIZATION}}. {{PERSONALITY}} Read the README.md for API instructions and join the chat application at {{HOST}} and set your identity to {{NAME}} and await the human supervisor to specify the session can begin in the chat app before chatting. When ready, begin chatting with the team and try to discuss the subject provided by the human operator. Please keep messages short so that collaboration can be maximized. This will be a hybrid team of AI agents and humans so we want to encourage equal participation. When given the queue to end the chat by the human supervisor in the chat application, send one final message summarizing key details and insights that represent your position and role as well as any insights provided by other agents.`;

    const prompts = [];
    const templateInput = document.getElementById('template-input');
    const varFieldsEl = document.getElementById('var-fields');
    const listEl = document.getElementById('prompt-list');
    const emptyEl = document.getElementById('empty-state');
    const countEl = document.getElementById('prompt-count');
    const generateBtn = document.getElementById('generate-btn');

    let currentVars = [];

    function parseVars(template) {
      const seen = new Set();
      const vars = [];
      const re = /\{\{(\w+)\}\}/g;
      let m;
      while ((m = re.exec(template)) !== null) {
        if (!seen.has(m[1])) {
          seen.add(m[1]);
          vars.push(m[1]);
        }
      }
      return vars;
    }

    function colorFor(varName) {
      const idx = currentVars.indexOf(varName);
      return VAR_COLORS[idx % VAR_COLORS.length];
    }

    function buildVarFields() {
      const vars = parseVars(templateInput.value);
      const prevValues = {};
      varFieldsEl.querySelectorAll('input[data-var]').forEach(inp => {
        prevValues[inp.dataset.var] = inp.value;
      });

      currentVars = vars;
      varFieldsEl.innerHTML = '';

      if (vars.length === 0) {
        varFieldsEl.innerHTML = '<div class="no-vars">no variables detected &mdash; use {{NAME}} syntax</div>';
        return;
      }

      for (const v of vars) {
        const group = document.createElement('div');
        group.className = 'field-group';

        const lbl = document.createElement('label');
        lbl.textContent = v.toLowerCase();
        lbl.setAttribute('for', `var-${v}`);

        const inp = document.createElement('input');
        inp.type = 'text';
        inp.id = `var-${v}`;
        inp.dataset.var = v;
        inp.placeholder = `{{${v}}}`;
        if (prevValues[v] !== undefined) inp.value = prevValues[v];
        inp.addEventListener('keydown', e => { if (e.key === 'Enter') addPrompt(); });

        group.appendChild(lbl);
        group.appendChild(inp);
        varFieldsEl.appendChild(group);
      }
    }

    function getTemplate() {
      return templateInput.value;
    }

    function resolveTemplate(template, values) {
      return template.replace(/\{\{(\w+)\}\}/g, (_, key) => values[key] !== undefined ? values[key] : `{{${key}}}`);
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function highlightResolved(template, values) {
      return esc(template).replace(/\{\{(\w+)\}\}/g, (_, key) => {
        if (values[key] !== undefined) {
          const color = colorFor(key);
          return `<span class="tpl-val" style="color:${color}">${esc(values[key])}</span>`;
        }
        return `{{${esc(key)}}}`;
      });
    }

    function render() {
      countEl.textContent = `${prompts.length} prompt${prompts.length !== 1 ? 's' : ''}`;
      emptyEl.style.display = prompts.length ? 'none' : 'block';

      listEl.querySelectorAll('.prompt-card').forEach(el => el.remove());

      prompts.forEach((p, i) => {
        const card = document.createElement('div');
        card.className = 'prompt-card';

        const vars = parseVars(p.template);
        const firstVal = vars.length > 0 ? (p.values[vars[0]] || '') : '';
        const secondVal = vars.length > 1 ? (p.values[vars[1]] || '') : '';

        card.innerHTML = `
          <div class="prompt-card-header">
            <div class="prompt-card-title">
              #${i + 1} ${esc(firstVal)}
              ${secondVal ? `<span class="tag">${esc(secondVal)}</span>` : ''}
            </div>
            <div class="prompt-card-actions">
              <button class="icon-btn copy-btn" title="Copy to clipboard" data-index="${i}">&#9112;</button>
              <button class="icon-btn delete" title="Remove" data-index="${i}">&times;</button>
            </div>
          </div>
          <div class="prompt-card-body">${highlightResolved(p.template, p.values)}</div>
        `;

        listEl.appendChild(card);
      });
    }

    function addPrompt() {
      const template = getTemplate();
      const vars = parseVars(template);
      const values = {};
      let allFilled = true;

      for (const v of vars) {
        const inp = document.getElementById(`var-${v}`);
        const val = inp ? inp.value.trim() : '';
        if (!val) { allFilled = false; break; }
        values[v] = val;
      }

      if (!allFilled || vars.length === 0) return;

      prompts.push({ template, values });

      // Clear variable inputs but keep template
      varFieldsEl.querySelectorAll('input[data-var]').forEach(inp => { inp.value = ''; });
      const firstInput = varFieldsEl.querySelector('input[data-var]');
      if (firstInput) firstInput.focus();

      render();
    }

    generateBtn.addEventListener('click', addPrompt);

    templateInput.addEventListener('input', buildVarFields);

    listEl.addEventListener('click', async e => {
      const copyBtn = e.target.closest('.copy-btn');
      const deleteBtn = e.target.closest('.delete');

      if (copyBtn) {
        const idx = parseInt(copyBtn.dataset.index);
        const p = prompts[idx];
        const text = resolveTemplate(p.template, p.values);

        await navigator.clipboard.writeText(text);
        copyBtn.classList.add('copied');
        copyBtn.textContent = '\u2713';
        setTimeout(() => {
          copyBtn.classList.remove('copied');
          copyBtn.innerHTML = '&#9112;';
        }, 1500);
      }

      if (deleteBtn) {
        const idx = parseInt(deleteBtn.dataset.index);
        prompts.splice(idx, 1);
        render();
      }
    });

    // Init with default template
    templateInput.value = DEFAULT_TEMPLATE;
    buildVarFields();
    render();
  </script>
</body>
</html>
