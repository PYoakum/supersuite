#!/usr/bin/env bash
# ─────────────────────────────────────────────────────────────
# Codebaux Guest Protocol Configuration
# Shared constants for all guest helper scripts.
# Source this file: . /etc/codebaux/protocol.conf
# ─────────────────────────────────────────────────────────────

# Serial device used for host↔guest communication
SERIAL_DEV="/dev/ttyS0"

# Host-to-guest protocol markers
HOST_PING="HOST_PING"
HOST_SYNC_BEGIN="HOST_SYNC_BEGIN"
HOST_SYNC_CHUNK="HOST_SYNC_CHUNK:"
HOST_SYNC_END="HOST_SYNC_END"
HOST_RUN="HOST_RUN"
HOST_STOP="HOST_STOP"

# Guest-to-host protocol markers
GUEST_READY="GUEST_READY"
GUEST_SYNC_OK="GUEST_SYNC_OK"
GUEST_SYNC_FAIL="GUEST_SYNC_FAIL:"
GUEST_RUN_START="GUEST_RUN_START"
GUEST_RUN_OK="GUEST_RUN_OK"
GUEST_RUN_FAIL="GUEST_RUN_FAIL:"
GUEST_LOG="GUEST_LOG:"
GUEST_PREVIEW_FILE="GUEST_PREVIEW_FILE:"

# Filesystem paths
WORKSPACE="/workspace"
WORKSPACE_OUT="/workspace/out"
INCOMING_ARCHIVE="/tmp/incoming-project.tar.gz"
PID_FILE="/tmp/project.pid"
PROJECT_LOG="/var/log/project.log"

# Default entrypoint
DEFAULT_ENTRYPOINT="server.js"

# ─── Helpers ───

# Emit a message to the serial port (host-visible)
emit() {
    echo "$1" > "${SERIAL_DEV}"
}

# Log locally and to serial
log_and_emit() {
    local msg="$1"
    echo "[$(date '+%H:%M:%S')] ${msg}" >> "${PROJECT_LOG}"
    emit "${msg}"
}

# Timestamp in seconds (for elapsed time calculations)
now_s() {
    date +%s
}
