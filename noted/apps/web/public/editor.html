<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Noted — Editor</title>
  <link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="/editor-styles.css">
  <link rel="stylesheet" href="/panels.css">
  <style>
    body { overflow: hidden; }
    .editor-nav {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.4rem 1rem;
      border-bottom: 1px solid var(--border);
      background: var(--bg-card);
      height: 42px;
    }
    .editor-nav .nav-brand { font-weight: 700; font-size: 1rem; text-decoration: none; color: inherit; }
    .editor-nav .spacer { flex: 1; }
    .save-status {
      font-size: 0.78rem;
      color: var(--text-muted);
      padding: 0.2rem 0.45rem;
    }
    .save-status.saving { color: var(--accent); }
    .save-status.saved { color: var(--success); }
    .save-status.error { color: var(--danger); }

    .title-input {
      font-size: 1.7rem;
      font-weight: 700;
      border: none;
      outline: none;
      width: 100%;
      padding: 1.25rem 0 0.5rem;
      font-family: var(--font);
      background: transparent;
      line-height: 1.2;
    }
    .title-input::placeholder { color: #d6d3d1; }

    .editor-scroll {
      height: calc(100vh - 42px);
      overflow-y: auto;
    }
    .editor-container {
      max-width: 750px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    .small-btn {
      font-size: 0.78rem;
      cursor: pointer;
      padding: 0.15rem 0.45rem;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-muted);
      transition: background 0.1s;
    }
    .small-btn:hover { background: var(--bg); color: var(--text); }

    .mode-toggle {
      font-size: 0.72rem;
      color: var(--text-muted);
      cursor: pointer;
      padding: 0.15rem 0.4rem;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg-card);
    }
    .mode-toggle:hover { background: var(--bg); }

    .raw-editor {
      width: 100%;
      min-height: calc(100vh - 200px);
      border: none;
      outline: none;
      padding: 0;
      font-family: var(--mono);
      font-size: 0.88rem;
      line-height: 1.7;
      resize: none;
      background: transparent;
      display: none;
    }
    .raw-editor.active { display: block; }
    .noted-editor.hidden { display: none; }

    .history-overlay {
      display: none; position: fixed; top: 0; right: 0; bottom: 0;
      width: 340px; background: var(--bg-card); border-left: 1px solid var(--border);
      box-shadow: -4px 0 20px rgba(0,0,0,0.08); z-index: 100; flex-direction: column;
    }
    .history-overlay.open { display: flex; }
    .history-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.75rem 1rem; border-bottom: 1px solid var(--border);
      font-weight: 600; font-size: 0.95rem;
    }
    .history-close { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--text-muted); }
    .history-list { flex: 1; overflow-y: auto; padding: 0.5rem 0; }
    .history-item { padding: 0.6rem 1rem; border-bottom: 1px solid var(--border); cursor: pointer; }
    .history-item:hover { background: var(--bg); }
    .history-item.current { border-left: 3px solid var(--accent); }
    .history-item-time { font-size: 0.8rem; color: var(--text-muted); }
    .history-item-meta { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.15rem; }
    .history-item-summary { font-size: 0.78rem; color: var(--accent); font-style: italic; }
    .history-preview { display: none; border-top: 1px solid var(--border); padding: 0.75rem 1rem; background: var(--bg); }
    .history-preview.active { display: block; }
    .history-preview-actions { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <div class="editor-nav">
    <a href="/" class="nav-brand">Noted</a>
    <div class="spacer"></div>
    <span id="save-status" class="save-status">Loading…</span>
    <button id="mode-toggle" class="mode-toggle" title="Switch to markdown mode">MD</button>
    <button id="visibility-btn" class="small-btn" style="display:none;"></button>
    <button id="history-btn" class="small-btn" style="display:none;">History</button>
    <button id="outline-btn" class="small-btn" style="display:none;" title="Toggle outline (headings)">Outline</button>
    <button id="info-btn" class="small-btn" style="display:none;" title="Tags, backlinks & info">Info</button>
    <a href="#" id="view-link" class="small-btn" style="display:none;">View</a>
  </div>

  <div class="editor-toolbar" id="toolbar">
    <select class="toolbar-select" id="block-type-select" title="Block type">
      <option value="paragraph">Paragraph</option>
      <option value="heading-1">Heading 1</option>
      <option value="heading-2">Heading 2</option>
      <option value="heading-3">Heading 3</option>
      <option value="bulletList">Bullet List</option>
      <option value="orderedList">Numbered List</option>
      <option value="taskList">Task List</option>
      <option value="codeBlock">Code Block</option>
      <option value="blockquote">Blockquote</option>
    </select>
    <div class="toolbar-sep"></div>
    <div class="toolbar-group">
      <button class="toolbar-btn" id="tb-bold" title="Bold (Ctrl+B)"><b>B</b></button>
      <button class="toolbar-btn" id="tb-italic" title="Italic (Ctrl+I)"><i>I</i></button>
      <button class="toolbar-btn" id="tb-code" title="Inline Code (Ctrl+E)">&lt;&gt;</button>
      <button class="toolbar-btn" id="tb-link" title="Link (Ctrl+K)">&#128279;</button>
    </div>
    <div class="toolbar-sep"></div>
    <button class="toolbar-btn" id="tb-divider" title="Horizontal Rule">—</button>
    <button class="toolbar-btn" id="tb-image" title="Upload Image">&#128247;</button>
    <input type="file" id="image-upload-input" accept="image/*,video/*" style="display:none" multiple>
  </div>

  <div class="editor-scroll" id="editor-scroll">
    <div class="editor-container">
      <input type="text" id="title-input" class="title-input" placeholder="Untitled" autocomplete="off">
      <div id="wysiwyg-editor"></div>
      <textarea id="raw-editor" class="raw-editor" placeholder="Write markdown…"></textarea>
    </div>
  </div>

  <div id="history-panel" class="history-overlay">
    <div class="history-header">
      <span>Version History</span>
      <button class="history-close" id="history-close">&times;</button>
    </div>
    <div class="history-list" id="history-list"></div>
    <div class="history-preview" id="history-preview">
      <div style="font-size:0.85rem;font-weight:500;" id="preview-label">Preview</div>
      <div id="diff-container"></div>
      <div class="history-preview-actions">
        <button class="btn btn-primary btn-sm" id="restore-btn" style="font-size:0.8rem;padding:0.3rem 0.7rem;">Restore</button>
        <button class="btn btn-secondary btn-sm" id="diff-toggle-btn" style="font-size:0.8rem;padding:0.3rem 0.7rem;">Show Diff</button>
        <button class="btn btn-secondary btn-sm" id="preview-close-btn" style="font-size:0.8rem;padding:0.3rem 0.7rem;">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Outline Panel -->
  <div id="outline-panel" class="outline-panel">
    <div class="outline-title">Outline</div>
    <div id="outline-list"></div>
  </div>

  <!-- Info Drawer (tags, backlinks) -->
  <div id="info-drawer" class="info-drawer">
    <div class="info-drawer-header">
      <span>Document Info</span>
      <button style="background:none;border:none;font-size:1.1rem;cursor:pointer;color:var(--text-muted);" id="info-close">&times;</button>
    </div>
    <div class="info-section" id="tags-section">
      <div class="info-section-title">Tags</div>
      <div id="tags-list"></div>
      <div class="tag-input-row">
        <input type="text" id="tag-input" class="tag-input" placeholder="Add tag…">
        <button id="add-tag-btn" class="add-tag-btn">+</button>
      </div>
    </div>
    <div class="info-section" id="backlinks-section">
      <div class="info-section-title">Backlinks</div>
      <div id="backlinks-list"></div>
    </div>
    <div class="info-section" id="meta-section">
      <div class="info-section-title">Details</div>
      <div id="meta-info" style="font-size:0.8rem;color:var(--text-muted);"></div>
    </div>
  </div>

  <script src="/app.js"></script>
  <script src="/editor-core.js"></script>
  <script src="/command-palette.js"></script>
  <script src="/diff.js"></script>
  <script>
    const slug = window.location.pathname.replace(/^\/e\//, '');
    let doc = null, baseVersionId = null, saveTimeout = null, saving = false, titleSaveTimeout = null, rawMode = false, selectedVersionId = null;
    const DEBOUNCE_MS = 800;

    const editor = new NotedEditor(document.getElementById('wysiwyg-editor'), { onChange: onContentChange });

    async function init() {
      const user = await requireLogin();
      if (!user) return;
      await loadDocument();
    }

    async function loadDocument() {
      try {
        const data = await api.get(`/api/docs/${encodeURIComponent(slug)}`);
        if (data.redirect) { window.location.href = `/e/${data.slug}`; return; }
        doc = data.document;
        baseVersionId = doc.current_version_id;
        document.getElementById('page-title').textContent = `${doc.title} — Noted`;
        document.getElementById('title-input').value = doc.title;
        editor.load(doc.content_markdown || '');
        document.getElementById('raw-editor').value = doc.content_markdown || '';
        document.getElementById('view-link').href = `/d/${doc.slug}`;
        document.getElementById('view-link').style.display = '';
        document.getElementById('visibility-btn').style.display = '';
        document.getElementById('history-btn').style.display = '';
        document.getElementById('outline-btn').style.display = '';
        document.getElementById('info-btn').style.display = '';
        updateVisibilityBtn();
        setStatus('saved', 'Saved');
      } catch (err) { setStatus('error', err.message); }
    }

    function onContentChange() {
      setStatus('', 'Unsaved');
      clearTimeout(saveTimeout);
      saveTimeout = setTimeout(saveContent, DEBOUNCE_MS);
    }

    document.getElementById('raw-editor').addEventListener('input', onContentChange);

    async function saveContent() {
      if (saving || !doc) return;
      saving = true;
      setStatus('saving', 'Saving…');
      try {
        const content = rawMode ? document.getElementById('raw-editor').value : editor.getMarkdown();
        const data = await api.post(`/api/docs/${encodeURIComponent(doc.slug)}/save`, {
          base_version_id: baseVersionId, content_markdown: content,
        });
        if (data.version_id) baseVersionId = data.version_id;
        setStatus('saved', data.changed ? 'Saved' : 'No changes');
      } catch (err) {
        setStatus('error', err.status === 409 ? 'Conflict — reload' : 'Save failed');
      } finally { saving = false; }
    }

    // Mode toggle
    document.getElementById('mode-toggle').addEventListener('click', () => {
      rawMode = !rawMode;
      const btn = document.getElementById('mode-toggle');
      const rawEl = document.getElementById('raw-editor');
      const wysEl = document.getElementById('wysiwyg-editor');
      const tb = document.getElementById('toolbar');
      if (rawMode) {
        rawEl.value = editor.getMarkdown();
        rawEl.classList.add('active'); wysEl.classList.add('hidden'); tb.style.display = 'none';
        btn.textContent = 'Rich'; btn.title = 'Switch to rich editor';
      } else {
        editor.load(rawEl.value);
        rawEl.classList.remove('active'); wysEl.classList.remove('hidden'); tb.style.display = '';
        btn.textContent = 'MD'; btn.title = 'Switch to markdown mode';
      }
    });

    // Toolbar
    document.getElementById('tb-bold').addEventListener('click', () => { if (!rawMode) editor._wrapSelection('**'); });
    document.getElementById('tb-italic').addEventListener('click', () => { if (!rawMode) editor._wrapSelection('*'); });
    document.getElementById('tb-code').addEventListener('click', () => { if (!rawMode) editor._wrapSelection('`'); });
    document.getElementById('tb-link').addEventListener('click', () => {
      if (rawMode) return;
      const text = window.getSelection().toString();
      const url = prompt('URL:', 'https://');
      if (url) { document.execCommand('insertText', false, `[${text || 'link'}](${url})`); if (editor.activeBlockId) { editor._syncBlockFromDom(editor.activeBlockId); editor._emitChange(); } }
    });
    document.getElementById('tb-divider').addEventListener('click', () => { if (!rawMode) editor.insertBlockAfter('divider'); });

    // Image upload
    document.getElementById('tb-image').addEventListener('click', () => {
      document.getElementById('image-upload-input').click();
    });
    document.getElementById('image-upload-input').addEventListener('change', async (e) => {
      for (const file of e.target.files) {
        await uploadAndInsert(file);
      }
      e.target.value = ''; // reset
    });

    // Drag and drop on editor
    const editorScroll = document.getElementById('editor-scroll');
    editorScroll.addEventListener('dragover', (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'copy'; });
    editorScroll.addEventListener('drop', async (e) => {
      e.preventDefault();
      if (rawMode) return;
      for (const file of e.dataTransfer.files) {
        if (file.type.startsWith('image/') || file.type.startsWith('video/')) {
          await uploadAndInsert(file);
        }
      }
    });

    async function uploadAndInsert(file) {
      setStatus('saving', 'Uploading…');
      try {
        const formData = new FormData();
        formData.append('file', file);
        const res = await fetch('/api/media/upload', {
          method: 'POST',
          body: formData,
          credentials: 'same-origin',
        });
        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error || 'Upload failed');
        }
        const data = await res.json();
        const m = data.media;

        if (!rawMode) {
          // Insert markdown image/video into editor
          const md = m.kind === 'video'
            ? `![video](${m.url})`
            : `![${file.name}](${m.url})`;
          editor.insertBlockAfter('paragraph', md);
        } else {
          const textarea = document.getElementById('raw-editor');
          const md = m.kind === 'video'
            ? `![video](${m.url})\n`
            : `![${file.name}](${m.url})\n`;
          const pos = textarea.selectionStart;
          textarea.value = textarea.value.slice(0, pos) + md + textarea.value.slice(pos);
        }
        setStatus('saved', 'Uploaded');
      } catch (err) {
        setStatus('error', err.message || 'Upload failed');
      }
    }
    document.getElementById('block-type-select').addEventListener('change', (e) => {
      if (rawMode) return;
      const val = e.target.value, id = editor.activeBlockId;
      if (!id) return;
      const block = editor.blocks.find(b => b.id === id);
      if (!block) return;
      if (val.startsWith('heading-')) { block.type = 'heading'; block.attrs = { level: parseInt(val.split('-')[1]) }; }
      else if (val === 'paragraph') { block.type = 'paragraph'; block.attrs = {}; }
      else { block.type = val; if (val === 'taskList') block.attrs = { checked: false }; else if (val === 'codeBlock') block.attrs = { lang: '' }; }
      editor._render(); editor._focusBlock(block.id, true); editor._emitChange();
      e.target.value = 'paragraph';
    });

    // Title
    document.getElementById('title-input').addEventListener('input', () => { clearTimeout(titleSaveTimeout); titleSaveTimeout = setTimeout(saveTitle, 1000); });
    document.getElementById('title-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); rawMode ? document.getElementById('raw-editor').focus() : editor.focus(); } });
    async function saveTitle() {
      if (!doc) return;
      const t = document.getElementById('title-input').value.trim() || 'Untitled';
      if (t === doc.title) return;
      try {
        const data = await api.put(`/api/docs/${encodeURIComponent(doc.slug)}`, { title: t });
        doc.title = data.document.title;
        document.getElementById('page-title').textContent = `${doc.title} — Noted`;
        const ns = data.document.slug;
        document.getElementById('view-link').href = `/d/${ns}`;
        if (ns !== doc.slug) { doc.slug = ns; history.replaceState(null, '', `/e/${ns}`); }
      } catch { setStatus('error', 'Title save failed'); }
    }

    // Visibility
    document.getElementById('visibility-btn').addEventListener('click', async () => {
      if (!doc) return;
      try { const data = await api.put(`/api/docs/${encodeURIComponent(doc.slug)}`, { isPublic: !doc.is_public }); doc.is_public = data.document.is_public; updateVisibilityBtn(); }
      catch { setStatus('error', 'Failed'); }
    });
    function updateVisibilityBtn() { const b = document.getElementById('visibility-btn'); b.textContent = doc.is_public ? 'Public' : 'Private'; }

    // History
    document.getElementById('history-btn').addEventListener('click', () => {
      document.getElementById('history-panel').classList.contains('open') ? closeHistory() : openHistory();
    });
    document.getElementById('history-close').addEventListener('click', closeHistory);
    document.getElementById('preview-close-btn').addEventListener('click', () => { document.getElementById('history-preview').classList.remove('active'); loadDocument(); });
    document.getElementById('restore-btn').addEventListener('click', async () => {
      if (!selectedVersionId || !doc) return;
      const btn = document.getElementById('restore-btn');
      btn.disabled = true;
      try { const d = await api.post(`/api/docs/${encodeURIComponent(doc.slug)}/restore/${selectedVersionId}`); if (d.version_id) baseVersionId = d.version_id; setStatus('saved', d.changed ? 'Restored' : 'Same'); closeHistory(); await loadDocument(); }
      catch { setStatus('error', 'Restore failed'); }
      finally { btn.disabled = false; }
    });

    async function openHistory() {
      document.getElementById('history-panel').classList.add('open');
      document.getElementById('history-btn').textContent = 'Close';
      const el = document.getElementById('history-list');
      el.innerHTML = '<div style="padding:1rem;color:var(--text-muted);text-align:center;">Loading…</div>';
      try {
        const d = await api.get(`/api/docs/${encodeURIComponent(doc.slug)}/versions`);
        const vs = d.versions || [];
        el.innerHTML = vs.map(v => {
          const t = new Date(v.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
          const cur = v.id === d.current_version_id;
          const sz = v.content_length > 1024 ? `${(v.content_length/1024).toFixed(1)} KB` : `${v.content_length} B`;
          const sm = v.summary ? `<div class="history-item-summary">${esc(v.summary)}</div>` : '';
          return `<div class="history-item${cur?' current':''}" data-vid="${v.id}"><div class="history-item-time">${t}${cur?' (current)':''}</div><div class="history-item-meta">${v.created_by_name||''} · ${sz} · ${v.content_hash.slice(0,8)}</div>${sm}</div>`;
        }).join('') || '<div style="padding:1rem;color:var(--text-muted);text-align:center;">No versions.</div>';
        el.querySelectorAll('.history-item').forEach(e => e.addEventListener('click', () => selectVersion(e.dataset.vid)));
      } catch { el.innerHTML = '<div style="padding:1rem;color:var(--danger);text-align:center;">Failed.</div>'; }
    }
    function closeHistory() { document.getElementById('history-panel').classList.remove('open'); document.getElementById('history-preview').classList.remove('active'); document.getElementById('history-btn').textContent = 'History'; selectedVersionId = null; }
    let selectedVersionContent = null;
    let currentContentForDiff = null;
    let showingDiff = false;

    async function selectVersion(vid) {
      selectedVersionId = vid;
      showingDiff = false;
      document.getElementById('diff-container').innerHTML = '';
      document.getElementById('diff-toggle-btn').textContent = 'Show Diff';
      try {
        const d = await api.get(`/api/docs/${encodeURIComponent(doc.slug)}/versions/${vid}`);
        selectedVersionContent = d.version.content_markdown;
        currentContentForDiff = rawMode ? document.getElementById('raw-editor').value : editor.getMarkdown();
        document.getElementById('preview-label').textContent = `Preview — ${new Date(d.version.created_at).toLocaleString()}`;
        document.getElementById('history-preview').classList.add('active');
        rawMode ? document.getElementById('raw-editor').value = d.version.content_markdown : editor.load(d.version.content_markdown);
        setStatus('', 'Previewing');
      } catch { setStatus('error', 'Load failed'); }
    }

    // Diff toggle
    document.getElementById('diff-toggle-btn').addEventListener('click', () => {
      showingDiff = !showingDiff;
      const container = document.getElementById('diff-container');
      const btn = document.getElementById('diff-toggle-btn');
      if (showingDiff && selectedVersionContent !== null && currentContentForDiff !== null) {
        const diff = computeDiff(selectedVersionContent, currentContentForDiff);
        container.innerHTML = renderDiffHtml(diff);
        btn.textContent = 'Hide Diff';
      } else {
        container.innerHTML = '';
        btn.textContent = 'Show Diff';
        showingDiff = false;
      }
    });

    window.addEventListener('beforeunload', (e) => { if (saveTimeout) { e.preventDefault(); e.returnValue = ''; } });
    function setStatus(cls, text) { const e = document.getElementById('save-status'); e.className = 'save-status' + (cls ? ' ' + cls : ''); e.textContent = text; }
    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    // ─── Command Palette (Ctrl+P) ────────────────
    const palette = new CommandPalette({
      getDocuments: async () => {
        const data = await api.get('/api/docs');
        return data.documents || [];
      },
      onSelect: (doc) => {
        window.location.href = `/e/${doc.slug}`;
      },
    });

    // ─── Outline Panel ───────────────────────────
    let outlineOpen = false;
    document.getElementById('outline-btn').addEventListener('click', () => {
      outlineOpen = !outlineOpen;
      document.getElementById('outline-panel').classList.toggle('open', outlineOpen);
      if (outlineOpen) updateOutline();
    });

    function updateOutline() {
      if (!outlineOpen) return;
      const el = document.getElementById('outline-list');
      const md = rawMode ? document.getElementById('raw-editor').value : editor.getMarkdown();
      const headings = [];
      md.split('\n').forEach(line => {
        const m = line.match(/^(#{1,6})\s+(.+?)(?:\s+#+)?\s*$/);
        if (m) headings.push({ level: m[1].length, text: m[2] });
      });
      if (headings.length === 0) {
        el.innerHTML = '<div class="outline-empty">No headings yet.</div>';
        return;
      }
      el.innerHTML = headings.map(h => {
        const cls = h.level >= 4 ? 'outline-h4' : h.level === 3 ? 'outline-h3' : h.level === 2 ? 'outline-h2' : '';
        return `<div class="outline-item ${cls}" data-text="${esc(h.text)}">${esc(h.text)}</div>`;
      }).join('');
      el.querySelectorAll('.outline-item').forEach(item => {
        item.addEventListener('click', () => {
          const text = item.dataset.text;
          // Find and scroll to heading in editor
          const blocks = editor.blocks || [];
          const block = blocks.find(b => b.type === 'heading' && b.content === text);
          if (block) editor._focusBlock(block.id);
        });
      });
    }

    // Refresh outline after content changes
    const origOnChange = onContentChange;
    function onContentChangeWithOutline() {
      origOnChange();
      if (outlineOpen) setTimeout(updateOutline, 100);
    }
    editor.onChange = onContentChangeWithOutline;

    // ─── Info Drawer (tags, backlinks) ───────────
    let infoOpen = false;
    document.getElementById('info-btn').addEventListener('click', () => {
      infoOpen = !infoOpen;
      document.getElementById('info-drawer').classList.toggle('open', infoOpen);
      if (infoOpen) loadInfo();
    });
    document.getElementById('info-close').addEventListener('click', () => {
      infoOpen = false;
      document.getElementById('info-drawer').classList.remove('open');
    });

    async function loadInfo() {
      if (!doc) return;
      // Tags
      try {
        const data = await api.get(`/api/docs/${encodeURIComponent(doc.slug)}/tags`);
        renderTags(data.tags || []);
      } catch { renderTags([]); }
      // Backlinks
      try {
        const data = await api.get(`/api/docs/${encodeURIComponent(doc.slug)}/backlinks`);
        renderBacklinks(data.backlinks || []);
      } catch { renderBacklinks([]); }
      // Meta
      const meta = document.getElementById('meta-info');
      const created = doc.created_at ? new Date(doc.created_at).toLocaleString() : '—';
      const updated = doc.updated_at ? new Date(doc.updated_at).toLocaleString() : '—';
      meta.innerHTML = `Created: ${created}<br>Updated: ${updated}<br>Slug: ${esc(doc.slug)}`;
    }

    function renderTags(tags) {
      const el = document.getElementById('tags-list');
      if (tags.length === 0) {
        el.innerHTML = '<div class="info-empty">No tags.</div>';
        return;
      }
      el.innerHTML = tags.map(t =>
        `<span class="info-tag">${esc(t.name)}<span class="remove-tag" data-tag="${esc(t.name)}">&times;</span></span>`
      ).join('');
      el.querySelectorAll('.remove-tag').forEach(btn => {
        btn.addEventListener('click', async () => {
          const tagName = btn.dataset.tag;
          const remaining = tags.filter(t => t.name !== tagName).map(t => t.name);
          await api.put(`/api/docs/${encodeURIComponent(doc.slug)}/tags`, { tags: remaining });
          loadInfo();
        });
      });
    }

    function renderBacklinks(backlinks) {
      const el = document.getElementById('backlinks-list');
      if (backlinks.length === 0) {
        el.innerHTML = '<div class="info-empty">No pages link here.</div>';
        return;
      }
      el.innerHTML = backlinks.map(b =>
        `<a class="info-item" href="/e/${b.slug}">${esc(b.title)}</a>`
      ).join('');
    }

    // Add tag
    async function addTag() {
      const input = document.getElementById('tag-input');
      const name = input.value.trim();
      if (!name || !doc) return;
      try {
        const { tags: existing } = await api.get(`/api/docs/${encodeURIComponent(doc.slug)}/tags`);
        const names = existing.map(t => t.name);
        if (!names.includes(name.toLowerCase())) names.push(name);
        await api.put(`/api/docs/${encodeURIComponent(doc.slug)}/tags`, { tags: names });
        input.value = '';
        loadInfo();
      } catch {}
    }
    document.getElementById('add-tag-btn').addEventListener('click', addTag);
    document.getElementById('tag-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); addTag(); }
    });

    init();
  </script>
</body>
</html>
