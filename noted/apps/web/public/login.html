<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Noted — Sign In</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="container-narrow" style="margin-top: 8vh;">
    <div class="text-center" style="margin-bottom: 2rem;">
      <h1 style="margin:0; font-size:1.6rem;">Noted</h1>
      <p class="text-muted text-sm">Self-hosted document editor</p>
    </div>

    <div class="card">
      <h2 id="form-title" style="margin-top:0; font-size:1.15rem;">Sign in</h2>

      <div id="alert" class="hidden"></div>

      <form id="auth-form" autocomplete="on">
        <div id="name-group" class="form-group hidden">
          <label for="displayName">Display Name</label>
          <input type="text" id="displayName" name="displayName" autocomplete="name" placeholder="Optional">
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" autocomplete="email" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required minlength="8">
        </div>

        <button type="submit" id="submit-btn" class="btn btn-primary btn-block">Sign in</button>
      </form>

      <p class="text-center text-sm mt-2">
        <a href="#" id="toggle-mode">Need an account? Sign up</a>
      </p>
    </div>
  </div>

  <script src="/app.js"></script>
  <script>
    let isSignup = false;
    const form = document.getElementById('auth-form');
    const toggle = document.getElementById('toggle-mode');
    const title = document.getElementById('form-title');
    const nameGroup = document.getElementById('name-group');
    const submitBtn = document.getElementById('submit-btn');

    // Redirect if already logged in
    redirectIfLoggedIn();

    toggle.addEventListener('click', (e) => {
      e.preventDefault();
      isSignup = !isSignup;
      title.textContent = isSignup ? 'Create account' : 'Sign in';
      submitBtn.textContent = isSignup ? 'Create account' : 'Sign in';
      toggle.textContent = isSignup ? 'Already have an account? Sign in' : 'Need an account? Sign up';
      nameGroup.classList.toggle('hidden', !isSignup);
      hideAlert('alert');
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideAlert('alert');
      submitBtn.disabled = true;
      submitBtn.textContent = isSignup ? 'Creating account…' : 'Signing in…';

      try {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const displayName = document.getElementById('displayName').value;

        const endpoint = isSignup ? '/api/auth/signup' : '/api/auth/login';
        const body = isSignup ? { email, password, displayName } : { email, password };

        await api.post(endpoint, body);
        window.location.href = '/';
      } catch (err) {
        showError('alert', err.message);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = isSignup ? 'Create account' : 'Sign in';
      }
    });
  </script>
</body>
</html>
